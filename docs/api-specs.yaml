    ReservationSeatsResponse:
      type: object
      properties:
        success:
          description: 요청 성공 여부
          type: boolean
          example: true
        code:
          description: http 상태 코드
          type: integer
          example: 200
        message:
          description: 응답 메시지
          example: "콘서트 좌석 조회에 성공하였습니다."
        data:
          type: object
          description: 응답 데이터
          properties:
            seats:
              type: array
              description: 전체 좌석 목록
              items:
                type: object
                properties:
                  seatId:
                    type: integer
                    description: 좌석 id
                  number:
                    type: string
                    description: 좌석 식별 번호
                  status:
                    type: string
                    description: |
                      좌석 상태 코드
                      - AVAILABLE: 즉시 예약 가능
                      - RESERVED: 예약 완료 (결제 확정)
                      - CANCELED: 예약 취소
                      - HOLD: 예약 보류 (결제 대기 등 임시 점유)
                    enum: [AVAILABLE, RESERVED, CANCELED, HOLD]
                  price:
                    type: integer
                    description: 좌석 가격
          example:
            seats:
              - seatId: 1
                number: A1
                status: AVAILABLE
                price: 100000
              - seatId: 2
                number: A2
                status: HOLD
                price: 100000
              - seatId: 3
                number: A3
                status: RESERVED
                price: 100000
              - seatId: 4
                number: A4
                status: CANCELED
                price: 100000
